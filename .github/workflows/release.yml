name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  lint:
    name: Lint & Check
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Rust check
        run: cargo check --manifest-path src-tauri/Cargo.toml --target x86_64-pc-windows-msvc

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Set version from tag
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          Write-Host "Setting version to $version"

          # Update tauri.conf.json — match "version" only at the top-level key
          $conf = Get-Content -Path "src-tauri/tauri.conf.json" -Raw
          $conf = $conf -replace '(?m)^(\s*"version"\s*:\s*)"[^"]*"', "`${1}`"$version`""
          Set-Content -Path "src-tauri/tauri.conf.json" -Value $conf

          # Update Cargo.toml — (?m) enables multiline so ^ matches start-of-line
          $cargo = Get-Content -Path "src-tauri/Cargo.toml" -Raw
          $cargo = $cargo -replace '(?m)^version = "[^"]*"', "version = `"$version`""
          Set-Content -Path "src-tauri/Cargo.toml" -Value $cargo

          Write-Host "Done — tauri.conf.json and Cargo.toml updated to $version"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'VPN Toggle ${{ github.ref_name }}'
          releaseBody: 'See CHANGELOG for details.'
          releaseDraft: true
          prerelease: false
          args: --target x86_64-pc-windows-msvc
